name: Deploy Portfolio Backend

on:
  push:
    branches:
      - main  # Triggers when you push to the 'main' branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Navigate to the directory
            cd /home/ubuntu/portfolio-backend || exit

            # 2. Force Git to overwrite local changes with GitHub code
            git fetch --all
            git reset --hard origin/main

            # 3. Install dependencies
            npm install --omit=dev

            # 4. Restart using server.js (since that is your entry point)
            # We use --name to give it a consistent ID
            pm2 restart portfolio-backend || pm2 start server.js --name "portfolio-backend"
